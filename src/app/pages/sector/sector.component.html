<section class="relative h-[110vh] flex flex-col justify-center px-4 md:px-30 items-center overflow-hidden">
  <div class="absolute inset-0 z-0">
    <div class="overlay"></div>
    <div class="h-full w-full bg-fixed bg-cover bg-center bg-no-repeat"
      [style.background-image]="'url(' + sector?.banner + ')'"></div>
  </div>
  <div class="z-20 text-center md:text-left w-full px-4 md:px-0">
    <h1 class="text-4xl sm:text-3xl md:text-[40px] lg:text-[72px] text-black dark:text-white font-bold mb-2 md:mb-4">
      {{ sector?.title }}
    </h1>
    <p class="text-[14px] sm:text-sm md:text-base text-black dark:text-white max-w-xs sm:max-w-sm md:max-w-md lg:max-w-lg xl:max-w-xl">
      {{ sector?.subtitle }}
    </p>
  </div>
</section>



<section class="py-10 px-10 md:py-16 md:px-30 dark:bg-black">

        <h2 class="text-lg sm:text-[36px] md:text-[36px] text-black dark:text-white text-center md:text-left mb-4 sm:mb-8">
          {{ sector?.headerone }}
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 sm:gap-12 relative">
          <!-- Subtle Glow -->
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-orange-50/50 dark:bg-orange-900/10 blur-[80px] rounded-full pointer-events-none z-0"></div>

              {{ sector?.contenttwo }} <br class="hidden sm:block" />
              {{ sector?.contentthree }}

            <p class="mb-5">{{ sector?.paragraphtwo }}</p>
            <p>{{ sector?.paragraphthree }}</p>
