    <section class="relative h-[110vh] flex flex-col justify-center px-4 md:px-30 items-center overflow-hidden">
      <div class="absolute inset-0 z-0">
        <div class="h-full w-full cmb bg-fixed"></div>
        <div class="overlay"></div>
      </div>
      <div class="z-20 text-center md:text-left w-full px-4 md:px-0">
        <h1
          class="text-3xl md:text-[40px] lg:text-[72px] text-black dark:text-white font-bold mb-4 md:absolute md:bottom-[25%] md:left-[10%]"
        >
        Our Products
        </h1>
        <p class="text-sm md:text-base text-black dark:text-white md:absolute md:bottom-[15%] md:left-[10%] max-w-md">
          Discover our suite of innovative digital solutions designed to transform businesses,
          empower communities, and drive sustainable growth.
        </p>

    </section>



<!--pagination-->
<section class="py-12 px-4 md:px-30 dark:bg-black">
  <div class="flex items-center justify-center">
    <div class="pb-16">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for(product of paginatedProducts; track product.link) {
        <div class="bg-white dark:bg-[#111] rounded-3xl shadow-sm hover:shadow-xl p-0 flex flex-col transition-all duration-300 transform hover:-translate-y-2 border border-gray-100 dark:border-gray-800 h-full group relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-400 to-orange-600 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-left z-20"></div>
          
          <div class="w-full h-56 overflow-hidden relative"> <!-- Fixed height container -->
            <img src="{{ product.image }}" alt="{{ product.subject }}" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
            <div class="absolute top-4 left-4">
              <span class="bg-white/90 dark:bg-black/80 backdrop-blur-sm text-slate-900 dark:text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm">{{ product.category }}</span>
            </div>
          </div>
          
          <div class="p-6 flex-1 flex flex-col">
            <h3 class="text-slate-900 dark:text-white text-xl font-bold flex justify-between items-start mb-4 leading-snug">
              <span>{{ product.subject }}</span>

              <div [routerLink]="['/product-detail', product.link]" (click)="scrollToTop()" class="cursor-pointer ml-3 flex-shrink-0 mt-1">
                <div class="flex justify-center items-center w-8 h-8 rounded-full bg-orange-50 dark:bg-[#222] group-hover:bg-orange-500 group-hover:text-white transition-colors duration-300">
                  <mat-icon class="text-orange-500 group-hover:text-white dark:text-orange-400 transition-colors duration-300 text-[20px] w-[20px] h-[20px] flex items-center justify-center" aria-hidden="false" fontIcon="north_east"></mat-icon>
                </div>
              </div>
            </h3>
            <p class="text-gray-600 dark:text-[#A1A1AA] text-sm mt-auto leading-relaxed line-clamp-3">{{ product.content }}</p>
          </div>
        </div>
        }
      </div>
      <mat-paginator
        [length]="products.length"
        [pageSize]="10"
        [showFirstLastButtons]="true"
        [pageSizeOptions]="[5, 10, 25, 100]"
        [pageIndex]="currentPage"
        (page)="handlePageEvent($event)"
        aria-label="Select page"
        class="bg-transparent dark:bg-transparent text-black dark:text-white mt-8"
      >
      </mat-paginator>
    </div>
  </div>
</section>
